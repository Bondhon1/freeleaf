appId: com.freeleaf.app
productName: FreeLeaf
directories:
  buildResources: build
  output: release
files:
  - out/**
  - '!**/*.map'
extraResources:
  # Bundled command-line tools — copied to <resources>/win in the app.
  #   tectonic.exe — the LaTeX engine
  #   biber.exe    — bibliography backend, version-matched to the bundle's
  #                  biblatex (see scripts/fetch-biber.mjs)
  - from: resources/win
    to: win
    filter:
      - tectonic.exe
      - biber.exe
win:
  target:
    - nsis
  artifactName: ${productName}-${version}-Setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
